- hosts: localhost
  gather_facts: no
  connection: local

  environment:
    K8S_AUTH_KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"

  vars_files:
    - ["../custom.config.yml", "../default.config.yml"]

  roles:
    - ascender_restore