- name: Set backup paths
  ansible.builtin.set_fact:
    backup_current_dir: "{{ tmp_dir }}/backups/current"

- name: Remove restore if exists
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: awx.ansible.com/v1beta1
      kind: AWXRestore
      metadata:
        name: "ascender-app-restore"
        namespace: "{{ ASCENDER_NAMESPACE }}"
    verify_ssl: false

- name: Remove backup if exists
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: awx.ansible.com/v1beta1
      kind: AWXBackup
      metadata:
        name: "ascender-app-backup"
        namespace: "{{ ASCENDER_NAMESPACE }}"
    verify_ssl: false

- name: Remove existing temporary pod if present
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    name: temp-copy-pod
    namespace: "{{ ASCENDER_NAMESPACE }}"
    verify_ssl: false

- name: Take backup of the current database
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: awx.ansible.com/v1beta1
      kind: AWXBackup
      metadata:
        name: ascender-app-backup
        namespace: "{{ ASCENDER_NAMESPACE }}"
      spec:
        deployment_name: ascender-app
    verify_ssl: false
    wait: true

- name: Get backup information
  kubernetes.core.k8s_info:
    api_version: awx.ansible.com/v1beta1
    kind: AWXBackup
    name: ascender-app-backup
    namespace: "{{ ASCENDER_NAMESPACE }}"
    verify_ssl: false
    wait: true
  register: backup_info
  until: backup_info.resources[0].status.backupDirectory is defined
  retries: 30
  delay: 10

- name: Set backup directory fact
  ansible.builtin.set_fact:
    backup_directory: "{{ backup_info.resources[0].status.backupDirectory }}"
    backup_pvc: "{{ backup_info.resources[0].status.backupClaim }}"

- name: Display backup directory
  ansible.builtin.debug:
    msg: "Backup directory: {{ backup_directory }}"

- name: Display backup PVC
  ansible.builtin.debug:
    msg: "Backup PVC: {{ backup_pvc }}"


- name: Create a temporary pod to mount the PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: temp-copy-pod
        namespace: "{{ ASCENDER_NAMESPACE }}"
      spec:
        volumes:
          - name: pvc-storage
            persistentVolumeClaim:
              claimName: "{{ backup_pvc }}"
        containers:
          - name: busybox-container
            image: busybox:stable
            command: ["sleep", "infinity"]
            volumeMounts:
              - name: pvc-storage
                mountPath: "/backups"
        restartPolicy: Never
    wait: true
    wait_timeout: 180
    verify_ssl: false
  register: create_pod_result

- name: Wait for the temporary pod to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    name: temp-copy-pod
    namespace: "{{ ASCENDER_NAMESPACE }}"
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120
    verify_ssl: false

- name: Clean up old migration directory in PVC
  kubernetes.core.k8s_exec:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    pod: temp-copy-pod
    command: rm -fr /backups/ascender_restore

- name: Create new directory in PVC for restore
  kubernetes.core.k8s_exec:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    pod: temp-copy-pod
    command: mkdir /backups/ascender_restore/
    impersonate_user: 26
    verify_ssl: false

- name: Copy files to the PVC
  kubernetes.core.k8s_cp:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    pod: temp-copy-pod
    local_path: "{{ backup_current_dir }}/{{ item }}"
    remote_path: "/backups/ascender_restore/"
    state: to_pod
    verify_ssl: false
  loop:
    - tower.db
    - secrets.yml
    - awx_object

- name: Fix permissions on copied files
  kubernetes.core.k8s_exec:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    pod: temp-copy-pod
    command: chmod 777 /backups/ascender_restore/{{ item }}
    verify_ssl: false
  loop:
    - tower.db
    - secrets.yml
    - awx_object

- name: Fix ownership on copied files
  kubernetes.core.k8s_exec:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    pod: temp-copy-pod
    command: chown 26:26 /backups/ascender_restore/{{ item }}
    verify_ssl: false
  loop:
    - tower.db
    - secrets.yml
    - awx_object

- name: Clean up and delete the temporary pod
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: temp-copy-pod
        namespace: "{{ ASCENDER_NAMESPACE }}"
    verify_ssl: false

- name: Read secrets from local backup
  ansible.builtin.include_vars:
    file: "{{ backup_current_dir }}/secrets.yml"
    name: backup_secrets

- name: Restore postgres configuration secret from backup
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ backup_secrets.secrets.postgresConfigurationSecret.name }}"
        namespace: "{{ ASCENDER_NAMESPACE }}"
      data: "{{ backup_secrets.secrets.postgresConfigurationSecret.data }}"
      type: "{{ backup_secrets.secrets.postgresConfigurationSecret.type | default('Opaque') }}"
    verify_ssl: false

- name: Scale down Ascender pods
  kubernetes.core.k8s_scale:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    kind: Deployment
    name: "{{ item }}"
    replicas: 0
    wait: true
    wait_timeout: 180
    verify_ssl: false
  loop:
    - awx-operator-controller-manager
    - ascender-app-task
    - ascender-app-web

- name: Scale down Ascender Postgres StatefulSet
  kubernetes.core.k8s_scale:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    kind: StatefulSet
    name: ascender-app-postgres-15
    replicas: 0
    wait: true
    wait_timeout: 180
    verify_ssl: false

- name: Delete PVC for Postgres
  kubernetes.core.k8s:
    state: absent
    kind: PersistentVolumeClaim
    name: postgres-15-ascender-app-postgres-15-0
    namespace: "{{ ASCENDER_NAMESPACE }}"
    wait: true
    verify_ssl: false

- name: Scale up Ascender Postgres StatefulSet
  kubernetes.core.k8s_scale:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    kind: StatefulSet
    name: ascender-app-postgres-15
    replicas: 1
    wait: true
    wait_timeout: 180
    verify_ssl: false

- name: Restore the backup
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: awx.ansible.com/v1beta1
      kind: AWXRestore
      metadata:
        name: ascender-app-restore
        namespace: "{{ ASCENDER_NAMESPACE }}"
      spec:
        deployment_name: ascender-app
        backup_pvc_namespace: "{{ ASCENDER_NAMESPACE }}"
        backup_pvc: "{{ backup_pvc }}"
        backup_dir: /backups/ascender_restore
        no_log: false
        #force_drop_db: true
      wait: true
    verify_ssl: false

- name: Scale up Ascender Operator
  kubernetes.core.k8s_scale:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    kind: Deployment
    name: "{{ item }}"
    replicas: 1
    wait: true
    wait_timeout: 180
    verify_ssl: false
  loop:
    - awx-operator-controller-manager

- name: Wait for the Postgres pod to be ready
  kubernetes.core.k8s_info:
    namespace: "{{ ASCENDER_NAMESPACE }}"
    kind: Pod
    name: ascender-app-postgres-15-0
    verify_ssl: false
  register: db_pods
  until: db_pods.resources | length > 0
  retries: 60
  delay: 20

