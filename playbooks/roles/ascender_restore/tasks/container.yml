- name: Remove restore if exists
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: awx.ansible.com/v1beta1
      kind: AWXRestore
      metadata:
        name: ascender-app-restore
        namespace: "{{ ASCENDER_NAMESPACE }}"
    verify_ssl: false

- ansible.builtin.debug:
    msg: "Ascender restore complete. Files restored from {{ backup_current_dir }}/."
