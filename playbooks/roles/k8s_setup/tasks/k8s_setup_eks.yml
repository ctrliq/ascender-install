- name: Retrieve the current time in order to timestamp files
  ansible.builtin.setup:
    gather_subset:
     - date_time

- name: Ensure .kube directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: '0755'

- name: Determine if "{{ ansible_env.HOME }}/.kube/config" already exists
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.kube/config"
  register: existing_kubeconfig
  changed_when: false

- name: Check if existing kubeconfig can authenticate to the EKS cluster
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: existing_kubeconfig_check
  ignore_errors: true
  failed_when: false
  when: existing_kubeconfig.stat.exists and download_kubeconfig

- name: Set fact for kubeconfig validity
  ansible.builtin.set_fact:
    kubeconfig_valid: "{{ existing_kubeconfig_check.resources is defined and existing_kubeconfig_check.resources | length > 0 }}"
  when: existing_kubeconfig.stat.exists and download_kubeconfig

- name: create backup of existing "{{ ansible_env.HOME }}/.kube/config"
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/.kube/config"
    dest: "{{ ansible_env.HOME }}/.kube/config.{{ ansible_date_time.iso8601_basic_short }}"
  when: 
    - existing_kubeconfig.stat.exists
    - download_kubeconfig
    - not kubeconfig_valid

- name: Delete existing "{{ ansible_env.HOME }}/.kube/config"
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube/config"
    state: absent
  when: 
    - existing_kubeconfig.stat.exists
    - download_kubeconfig
    - not kubeconfig_valid

# Check for existing eks cluster
- name: Get list of all EKS clusters
  ansible.builtin.shell:
    cmd: "aws eks list-clusters --region={{ EKS_CLUSTER_REGION }} --output=json"
  register: eks_clusters
  changed_when: false

- name: Set fact for list of clusters
  ansible.builtin.set_fact:
    clusters_list: "{{ eks_clusters.stdout | from_json | dict2items | map(attribute='value') | first }}"

- name: Check if the desired cluster exists
  ansible.builtin.set_fact:
    cluster_exists: "{{ EKS_CLUSTER_NAME in clusters_list }}"

# - name: Debug - Show if the desired cluster exists
#   ansible.builtin.debug:
#     msg: "Cluster exists: {{ cluster_exists }}"

# If EKS_CLUSTER_NAME does not exist, set up new eks cluster
- name: "If target cluster {{ EKS_CLUSTER_NAME }} does not exist, create it"
  when: not cluster_exists and EKS_CLUSTER_STATUS=="provision"
  include_tasks: k8s_setup_eks_provision.yml

- name: Ensure kubeconfig exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube/config"
    state: touch
    owner: "{{ ansible_user }}"
    mode: '0644'
  when: download_kubeconfig
  changed_when: false

- name: Retrieve kubeconfig for the EKS cluster
  ansible.builtin.shell:
    cmd: "aws eks update-kubeconfig --region {{ EKS_CLUSTER_REGION }} --name {{ EKS_CLUSTER_NAME }}"
  register: get_credentials_result
  environment:
    KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
  when: download_kubeconfig

- name: Ensure that the KUBECONFIG file can successfully authenticate to the EKS cluster
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Node
  register: result
  ignore_errors: yes
  retries: 5
  delay: 10
  until: result.resources is defined and result.resources | length > 0

- name: Fail the playbook if EKS authentication check is unsuccessful
  ansible.builtin.fail:
    msg: "Unable to retrieve EKS nodes after multiple retries."
  when: result.resources is not defined or result.resources | length == 0

# Ensure an IAM OIDC provider exists for it, and apply AmazonEBSCSIDriverPolicy
- name: "Apply AmazonEBSCSIDriverPolicy to {{ EKS_CLUSTER_NAME }}"
  when: "(not cluster_exists and EKS_CLUSTER_STATUS == 'provision') or EKS_CLUSTER_STATUS == 'configure'"
  block:   

    - name: "Apply Cert Manager spec"
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('ansible.builtin.template', 'templates/eks/cert-manager.yml') }}"
        verify_ssl: false

    - name: "Apply ALB spec"
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('ansible.builtin.template', 'templates/eks/ingress-controller.yml') }}"
        verify_ssl: false
      register: result
      retries: 6
      delay: 10
      until: result is not failed

    - name: "Apply ALB class params"
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('ansible.builtin.template', 'templates/eks/ingress-class-params.yml') }}"
        verify_ssl: false

    - name: Get node group name
      ansible.builtin.shell: aws eks list-nodegroups --region {{ EKS_CLUSTER_REGION }} --cluster-name {{ EKS_CLUSTER_NAME }} --query 'nodegroups[0]' --output text
      register: nodegroup_name
      changed_when: false

    - name: Get IAM role of EKS worker nodes
      ansible.builtin.shell: aws eks describe-nodegroup --region {{ EKS_CLUSTER_REGION }} --cluster-name {{ EKS_CLUSTER_NAME }} --nodegroup-name {{ nodegroup_name.stdout }} --query 'nodegroup.nodeRole' --output text
      register: node_role_arn
      changed_when: false

    - name: Define worker node required managed policies
      set_fact:
        new_policies:
          - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
          - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
          - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
          - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
          - arn:aws:iam::aws:policy/AmazonEKSLoadBalancingPolicy
          - arn:aws:iam::aws:policy/ElasticLoadBalancingReadOnly

    - name: Get current IAM role managed policies
      amazon.aws.iam_role_info:
        name: "{{ node_role_arn.stdout.split('/')[1] }}"
      register: role_info
      changed_when: false

    - name: Extract managed policy ARNs
      ansible.builtin.set_fact:
        existing_policies: "{{ role_info.iam_roles[0].managed_policies | map(attribute='policy_arn') | list }}"
      changed_when: false

    - name: Combine existing and new managed policies
      ansible.builtin.set_fact:
        combined_policies: "{{ existing_policies | union(new_policies) }}"
      changed_when: false

    - name: Set new policy document
      ansible.builtin.set_fact:
        new_statement: |
          {
            "Effect": "Allow",
            "Principal": {
              "Service": "eks.amazonaws.com"
            },
            "Action": "sts:AssumeRole"
          }
      changed_when: false

    - name: Set current assume role policy document
      ansible.builtin.set_fact:
        current_policy_document: "{{ role_info.iam_roles[0].assume_role_policy_document }}"
      changed_when: false

    - name: Add new statement to policy document
      ansible.builtin.set_fact:
        updated_policy_document: "{{ current_policy_document | combine({'Statement': current_policy_document.Statement + [ new_statement | from_json ]}, recursive=True) }}"
      when: (new_statement | from_json) not in current_policy_document.Statement

    - name: Set final assume role policy document
      ansible.builtin.set_fact:
        final_policy_document: "{{ updated_policy_document | default(current_policy_document) }}"

    - name: Update IAM role with managed policies and assume role policy
      amazon.aws.iam_role:
        name: "{{ node_role_arn.stdout.split('/')[1] }}"
        assume_role_policy_document: "{{ final_policy_document | to_nice_json }}"
        managed_policies: "{{ combined_policies }}"
        state: present

    - name: Create IAM Policy for AWSLoadBalancerControllerIAMPolicy 
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ node_role_arn.stdout.split('/')[1] }}"
        policy_name: "AWSLoadBalancerControllerIAMPolicy"
        policy_json: "{{ lookup('template', 'templates/eks/iam-policy.json') }}"
        state: present

    - name: Determine the OIDC issuer ID for your cluster
      ansible.builtin.shell: >
        aws eks describe-cluster
        --region {{ EKS_CLUSTER_REGION }}
        --name {{ EKS_CLUSTER_NAME }}
        --query "cluster.identity.oidc.issuer"
        --output text | cut -d '/' -f 5
      register: oidc_query
      changed_when: false

    - name: Determine whether an IAM OIDC provider with your cluster's issuer ID is already in your account
      ansible.builtin.shell:
        cmd: "aws iam list-open-id-connect-providers | grep {{ oidc_query.stdout }} | cut -d \"/\" -f4"
      register: oidc_provider_query
      changed_when: false
      failed_when: false

    - name: Create an IAM OIDC identity provider for your cluster if one does not exist
      ansible.builtin.command: >
        eksctl utils associate-iam-oidc-provider
        --region {{ EKS_CLUSTER_REGION }}
        --cluster {{ EKS_CLUSTER_NAME }}
        --approve
      when: oidc_provider_query.stdout == ""

    - name: Check if EBS CSI Driver service account exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: ServiceAccount
        name: ebs-csi-controller-sa
        namespace: kube-system
      register: ebs_sa_check
      ignore_errors: true

    - name: Create IAM service account for EBS CSI Driver
      ansible.builtin.command: >
        eksctl create iamserviceaccount
        --name ebs-csi-controller-sa
        --namespace kube-system
        --region {{ EKS_CLUSTER_REGION }}
        --cluster {{ EKS_CLUSTER_NAME }}
        --attach-policy-arn arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
        --approve
        --override-existing-serviceaccounts
      when: ebs_sa_check.resources is not defined or ebs_sa_check.resources | length == 0

    - name: Check if EBS CSI Driver is already deployed
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: DaemonSet
        name: ebs-csi-node
        namespace: kube-system
      register: ebs_csi_check
      ignore_errors: true

    - name: Deploy Amazon EBS CSI Driver
      ansible.builtin.command: kubectl apply -k "github.com/kubernetes-sigs/aws-ebs-csi-driver/deploy/kubernetes/overlays/stable/?ref=release-1.32"
      when: ebs_csi_check.resources is not defined or ebs_csi_check.resources | length == 0    

    - name: Include default storage class from EKS_DEFAULT_STORAGE_CLASS
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('ansible.builtin.template', 'templates/eks/storage/' + EKS_DEFAULT_STORAGE_CLASS + '.yml') }}"
        verify_ssl: false
      when:
        - EKS_DEFAULT_STORAGE_CLASS is defined
        - EKS_DEFAULT_STORAGE_CLASS in ['gp2', 'gp3', 'io2']