---
# Read AWX secrets from backup and patch K8s secrets.
# Worker pod must still be running (has PVC mounted).
# Deletes worker pod last, freeing PVC for pg_restore.

- name: Read AWX secrets from backup
  kubernetes.core.k8s_exec:
    namespace: "{{ ascender.namespace }}"
    pod: awx-migrate-ascender
    command: sh -c "cat /backups/awx-prod/secrets.yml"
  register: awx_secrets_raw

- name: Parse AWX secrets
  ansible.builtin.set_fact:
    awx_secrets: "{{ (awx_secrets_raw.stdout | from_yaml).secrets }}"
  no_log: true

- name: Patch K8s secrets from backup
  kubernetes.core.k8s:
    state: present
    api_version: v1
    kind: Secret
    name: "{{ item.dest_name }}"
    namespace: "{{ ascender.namespace }}"
    definition:
      data: "{{ awx_secrets[item.src_key].data }}"
  no_log: true
  loop: "{{ secret_patches }}"
  loop_control:
    label: "{{ item.src_key }} -> {{ item.dest_name }}"
  when: not (item.optional | default(false)) or awx_secrets[item.src_key] is defined

- name: Read AWX CR spec from backup
  kubernetes.core.k8s_exec:
    namespace: "{{ ascender.namespace }}"
    pod: awx-migrate-ascender
    command: sh -c "cat /backups/awx-prod/awx_object"
  register: awx_object_raw

- name: Parse AWX CR spec
  ansible.builtin.set_fact:
    awx_object_spec: "{{ (awx_object_raw.stdout | from_yaml).spec }}"

- name: Delete worker pod
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    name: awx-migrate-ascender
    namespace: "{{ ascender.namespace }}"
    wait: true
